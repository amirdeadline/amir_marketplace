$id: use_subagent.plan
title: Finalized orchestration plan
type: object
required: [objective, scope, confirmed_requirements, acceptance_criteria, validation_strategy, tasks]
properties:
  objective: { type: string }
  scope: { type: string }
  out_of_scope: { type: array, items: { type: string } }
  confirmed_requirements:
    type: array
    items:
      type: object
      required: [id, text]
      properties:
        id: { type: string }
        text: { type: string }
  assumptions: { type: array, items: { type: string } }
  constraints: { type: array, items: { type: string } }
  acceptance_criteria: { type: array, items: { type: string } }
  implementation_strategy: { type: string }
  validation_strategy: { type: string }
  rollback: { type: string }
  risks: { type: array, items: { type: string } }
  capability_mode: { type: string, enum: [A, B, C, D] }
  tasks: { type: array, items: { type: string }, description: Task IDs }
