$id: use_subagent.validation
title: Orchestrator validation of a task result
type: object
required: [task_id, verdict, checks]
properties:
  task_id: { type: string }
  verdict: { type: string, enum: [accepted, rejected, retry_required] }
  checks:
    type: array
    items:
      type: object
      required: [name, passed, evidence]
      properties:
        name: { type: string }
        passed: { type: boolean }
        evidence: { type: string }
  scope_ok: { type: boolean }
  independent_review_required: { type: boolean }
  notes: { type: string }
