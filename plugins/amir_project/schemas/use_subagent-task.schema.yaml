$id: use_subagent.task
title: Atomic orchestration task
type: object
required:
  - task_id
  - title
  - type
  - objective
  - description
  - acceptance_criteria
  - validation
  - risk_level
  - execution_mode
  - assigned_agent_profile
  - status
properties:
  task_id: { type: string, pattern: '^T[0-9]{3,}$' }
  title: { type: string }
  type:
    type: string
    enum: [discovery, design, implementation, test, review, documentation, integration, validation]
  objective: { type: string }
  description: { type: string }
  reason: { type: string }
  inputs: { type: array, items: { type: string } }
  dependencies: { type: array, items: { type: string } }
  context_scope: { type: array, items: { type: string } }
  allowed_changes: { type: array, items: { type: string } }
  prohibited_changes: { type: array, items: { type: string } }
  acceptance_criteria:
    type: array
    minItems: 1
    items: { type: string }
  validation: { type: array, items: { type: string } }
  deliverables: { type: array, items: { type: string } }
  risk_level: { type: string, enum: [low, medium, high] }
  execution_mode: { type: string, enum: [sequential, parallel] }
  estimated_complexity: { type: string, enum: [trivial, small, moderate] }
  assigned_agent_profile: { type: string }
  status:
    type: string
    enum:
      - pending
      - ready
      - dispatched
      - in_progress
      - result_received
      - validating
      - completed
      - blocked
      - failed
      - retry_required
      - superseded
      - cancelled
